name: Vercel production verification

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: vercel-production-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify Git-connected production deployment
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: production
      url: ${{ vars.VERCEL_PRODUCTION_URL || 'https://openbucket-eight.vercel.app' }}
    env:
      PRODUCTION_URL: ${{ vars.VERCEL_PRODUCTION_URL || 'https://openbucket-eight.vercel.app' }}

    steps:
      - name: Wait for the production alias to serve this commit
        shell: bash
        run: |
          set -euo pipefail
          base_url="${PRODUCTION_URL%/}"
          echo "Waiting for ${base_url} to serve ${GITHUB_SHA}."

          for attempt in {1..60}; do
            response=""
            if response="$(curl \
              --silent --show-error --fail --location \
              --connect-timeout 5 --max-time 5 \
              --header 'Cache-Control: no-cache' \
              --header 'Pragma: no-cache' \
              --url "${base_url}/deployment.json?expected=${GITHUB_SHA}&attempt=${attempt}")"; then
              deployed_sha="$(jq -r 'if type == "object" and (.commitSha | type == "string") then .commitSha else "" end' <<<"${response}" 2>/dev/null || true)"
              if [[ "${deployed_sha}" == "${GITHUB_SHA}" ]]; then
                echo "Production is serving ${deployed_sha}."
                {
                  echo "### Vercel production verified"
                  echo "${base_url} is serving commit ${deployed_sha}."
                } >> "${GITHUB_STEP_SUMMARY}"
                exit 0
              fi
              echo "Attempt ${attempt}/60: production reports ${deployed_sha:-no commit yet}."
            else
              echo "Attempt ${attempt}/60: deployment metadata is not available yet."
            fi
            sleep 10
          done

          echo "::error::${base_url} did not serve ${GITHUB_SHA} before the verification deadline."
          exit 1
