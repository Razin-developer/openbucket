name: Vercel deployment

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment environment
        required: true
        default: preview
        type: choice
        options:
          - preview
          - production

permissions:
  contents: read

concurrency:
  group: vercel-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy prebuilt output
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: ${{ ((github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && inputs.environment == 'production')) && 'production' || 'preview' }}
      url: ${{ steps.deployment.outputs.url }}

    steps:
      - name: Check deployment configuration
        id: config
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        shell: bash
        run: |
          if [[ -n "${VERCEL_TOKEN}" && -n "${VERCEL_ORG_ID}" && -n "${VERCEL_PROJECT_ID}" ]]; then
            echo "configured=true" >> "${GITHUB_OUTPUT}"
          else
            echo "configured=false" >> "${GITHUB_OUTPUT}"
            echo "Vercel deployment skipped: configure VERCEL_TOKEN, VERCEL_ORG_ID, and VERCEL_PROJECT_ID." >> "${GITHUB_STEP_SUMMARY}"
          fi

      - name: Select deployment target
        if: steps.config.outputs.configured == 'true'
        id: target
        env:
          EVENT_NAME: ${{ github.event_name }}
          REQUESTED_ENVIRONMENT: ${{ inputs.environment }}
          REF_NAME: ${{ github.ref }}
        shell: bash
        run: |
          if [[ "${EVENT_NAME}" == "push" && "${REF_NAME}" == "refs/heads/main" ]] || [[ "${EVENT_NAME}" == "workflow_dispatch" && "${REQUESTED_ENVIRONMENT}" == "production" ]]; then
            echo "environment=production" >> "${GITHUB_OUTPUT}"
            echo "production_flag=--prod" >> "${GITHUB_OUTPUT}"
          else
            echo "environment=preview" >> "${GITHUB_OUTPUT}"
            echo "production_flag=" >> "${GITHUB_OUTPUT}"
          fi

      - name: Check out source
        if: steps.config.outputs.configured == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Set up Node.js
        if: steps.config.outputs.configured == 'true'
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 24
          cache: npm

      # Pin the CLI so deployments remain reproducible. Dependabot does not
      # update CLI versions embedded in commands; review this pin periodically.
      - name: Install dependencies and Vercel CLI
        if: steps.config.outputs.configured == 'true'
        run: |
          npm ci
          npm install --global vercel@56.2.1

      - name: Pull Vercel project settings
        if: steps.config.outputs.configured == 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel pull --yes --environment="${{ steps.target.outputs.environment }}" --token="${VERCEL_TOKEN}"

      - name: Build Vercel output
        if: steps.config.outputs.configured == 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          PRODUCTION_FLAG: ${{ steps.target.outputs.production_flag }}
        shell: bash
        run: |
          args=()
          if [[ -n "${PRODUCTION_FLAG}" ]]; then args+=("${PRODUCTION_FLAG}"); fi
          vercel build "${args[@]}" --token="${VERCEL_TOKEN}"

      - name: Deploy prebuilt output
        if: steps.config.outputs.configured == 'true'
        id: deployment
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          PRODUCTION_FLAG: ${{ steps.target.outputs.production_flag }}
        shell: bash
        run: |
          args=(--prebuilt)
          if [[ -n "${PRODUCTION_FLAG}" ]]; then args+=("${PRODUCTION_FLAG}"); fi
          deployment_url="$(vercel deploy "${args[@]}" --token="${VERCEL_TOKEN}")"
          echo "url=${deployment_url}" >> "${GITHUB_OUTPUT}"
          echo "### Vercel ${{ steps.target.outputs.environment }} deployment" >> "${GITHUB_STEP_SUMMARY}"
          echo "${deployment_url}" >> "${GITHUB_STEP_SUMMARY}"
