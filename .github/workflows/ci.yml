name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
    types: [checks_requested]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workflow-lint:
    name: GitHub Actions syntax and shell safety
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Run actionlint 1.7.12
        run: docker run --rm -v "${PWD}:/repo" -w /repo rhysd/actionlint:1.7.12@sha256:b1934ee5f1c509618f2508e6eb47ee0d3520686341fec936f3b79331f9315667

  quality:
    name: Node ${{ matrix.node }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node: [22, 24]

    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run type-check

      - name: Test
        run: npm test

      # npm test includes the production web and CLI builds. Keep an explicit
      # build on the primary runner so the required release command is visible.
      - name: Build production artifacts
        if: matrix.os == 'ubuntu-latest' && matrix.node == 24
        run: npm run build

      - name: Build Vercel artifacts
        if: matrix.os == 'ubuntu-latest' && matrix.node == 24
        run: npm run build:vercel

      - name: Verify release metadata and artifacts
        if: matrix.os == 'ubuntu-latest' && matrix.node == 24
        run: npm run verify:release

  auth-mongodb:
    name: MongoDB 8.0 authentication and control plane
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      mongodb:
        image: mongo:8.0@sha256:3ce3de7f40e914034b03b7dec654005ab54f7dc8306937e44ec6760d9e9409a1
        ports:
          - 27017:27017
          - 27018:27018
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.runCommand({ ping: 1 }).ok' mongodb://127.0.0.1:27017/admin"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 24
          cache: npm

      - name: Install locked dependencies
        run: npm ci


      - name: Start transactional MongoDB replica set
        shell: bash
        run: |
          container_id="${{ job.services.mongodb.id }}"
          docker exec "${container_id}" mkdir -p /data/replica
          docker exec "${container_id}" mongod --dbpath /data/replica --port 27018 --replSet rs0 --bind_ip_all --fork --logpath /data/replica/mongod.log
          docker exec "${container_id}" mongosh --quiet --port 27018 --eval "rs.initiate({_id:'rs0',members:[{_id:0,host:'127.0.0.1:27018'}]})"
          for attempt in {1..20}; do
            echo "Waiting for replica set primary (${attempt}/20)..."
            if docker exec "${container_id}" mongosh --quiet --port 27018 --eval "quit(db.hello().isWritablePrimary ? 0 : 1)"; then
              exit 0
            fi
            sleep 1
          done
          exit 1
      - name: Run real MongoDB authentication and control-plane acceptance
        env:
          MONGODB_TEST_URI: mongodb://127.0.0.1:27018/?replicaSet=rs0&directConnection=true
          OPENBUCKET_REQUIRE_MONGODB_TEST: "true"
        run: |
          npm run test:auth:integration
          npm run test:control-plane:integration

  aws-cli-sync:
    name: AWS CLI 1.45.49 sync conformance
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 24
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - name: Install locked Node dependencies
        run: npm ci

      - name: Build the daemon and CLI
        run: npm run build:cli

      - name: Install pinned AWS CLI
        run: python -m pip install --disable-pip-version-check awscli==1.45.49

      - name: Run real AWS CLI sync acceptance
        run: node scripts/test-aws-cli-sync.mjs

  python:
    name: Python ${{ matrix.python }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: python
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: ${{ matrix.python }}
          cache: pip
          cache-dependency-path: python/pyproject.toml

      - name: Install client and quality tools
        run: python -m pip install --disable-pip-version-check --editable ".[dev]" twine

      - name: Lint
        run: |
          python -m ruff format --check .
          python -m ruff check .

      - name: Type-check
        run: python -m mypy

      - name: Test
        run: python -m unittest discover -s tests -p "test_*.py" -v

      - name: Build and validate distributions
        if: matrix.python == '3.13'
        shell: bash
        run: |
          python -m build --outdir dist .
          python -m twine check dist/*
          wheel="$(find dist -maxdepth 1 -name '*.whl' -print -quit)"
          test -n "${wheel}"
          python -m pip install --force-reinstall "${wheel}"
          openbucket-client --version

  package-smoke:
    name: npm package smoke test
    needs: [quality, auth-mongodb, python]
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 24
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Pack the publishable package
        id: pack
        shell: bash
        run: |
          mkdir -p "${RUNNER_TEMP}/openbucket-package"
          npm pack --pack-destination "${RUNNER_TEMP}/openbucket-package"
          package_file="$(find "${RUNNER_TEMP}/openbucket-package" -maxdepth 1 -name '*.tgz' -print -quit)"
          test -n "${package_file}"
          echo "path=${package_file}" >> "${GITHUB_OUTPUT}"

      - name: Install and execute the packed CLI
        shell: bash
        run: |
          npm install --global "${{ steps.pack.outputs.path }}"
          openbucket --version
          openbucket help

      - name: Upload package smoke artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: openbucket-npm-smoke
          path: ${{ steps.pack.outputs.path }}
          if-no-files-found: error
          retention-days: 7

  container-build:
    name: Container build smoke test
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Build daemon image
        run: docker build --target daemon --tag openbucket:ci-daemon .

      - name: Build dashboard image
        run: docker build --target dashboard --tag openbucket:ci-dashboard .
